<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kyrgyzstan Adventure Map</title>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Leaflet Elevation CSS -->
    <link rel="stylesheet" href="https://unpkg.com/@raruto/leaflet-elevation@2.5.0/dist/leaflet-elevation.css" />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div id="map"></div>

    <!-- Legend -->
    <div id="legend">
        <h3>Legend</h3>
        <div class="legend-section">
            <h4>Car Routes</h4>
            <div class="legend-item">
                <span class="legend-line dashed" style="background: #34495e;"></span>
                <span>Bishkek → Son-Kol</span>
            </div>
        </div>
                <div class="legend-section">
            <h4>Trip Parts</h4>
            <div class="legend-item">
                <span class="legend-marker" style="background: #27ae60;"></span>
                <span>Part 1: Bishkek → Son-Kul</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #3498db;"></span>
                <span>Part 2: Son-Kul → Issyk-Kul</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #9b59b6;"></span>
                <span>Part 3: Issyk-Kul → Bishkek</span>
            </div>
            <div class="legend-item">
                <span class="legend-marker" style="background: #95a5a6;"></span>
                <span>Future Trips</span>
            </div>
        </div>
    </div>

    <!-- Elevation container -->
    <div id="elevation-container">
        <div id="elevation"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- Leaflet GPX plugin -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet-gpx/1.7.0/gpx.min.js"></script>

    <!-- D3 for elevation charts -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <!-- Leaflet Elevation plugin -->
    <script src="https://unpkg.com/@raruto/leaflet-elevation@2.5.0/dist/leaflet-elevation.js"></script>

    <!-- Custom JS -->
    <script src="js/map.js"></script>
</body>
</html>
